<main class="ib-shell claims-shell">
  <section class="claims-hero">
    <p class="eyebrow">Claims Portal</p>
    <h1>Start a claim intake</h1>
    <p>
      Capture the first details an adjuster needs before triage.
    </p>
  </section>

  <form class="ib-panel intake-panel" [formGroup]="claimForm" (ngSubmit)="submitIntake()" novalidate>
    <div class="form-grid">
      <label class="ib-field">
        <span class="ib-label">Claimant name</span>
        <input class="ib-input" type="text" autocomplete="name" formControlName="claimantName">
        @if (claimForm.controls.claimantName.touched && claimForm.controls.claimantName.invalid) {
          <span class="field-error">Claimant name is required.</span>
        }
      </label>

      <label class="ib-field">
        <span class="ib-label">Email</span>
        <input class="ib-input" type="email" autocomplete="email" formControlName="email">
        @if (claimForm.controls.email.touched && claimForm.controls.email.invalid) {
          <span class="field-error">Enter a valid email address.</span>
        }
      </label>

      <label class="ib-field">
        <span class="ib-label">Policy number</span>
        <input class="ib-input" type="text" formControlName="policyNumber">
        @if (claimForm.controls.policyNumber.touched && claimForm.controls.policyNumber.invalid) {
          <span class="field-error">Policy number is required.</span>
        }
      </label>

      <label class="ib-field">
        <span class="ib-label">Loss type</span>
        <select class="ib-select" formControlName="lossType">
          <option>Auto collision</option>
          <option>Water damage</option>
          <option>Theft</option>
          <option>Liability</option>
        </select>
      </label>

      <label class="ib-field">
        <span class="ib-label">Incident date</span>
        <input class="ib-input" type="date" formControlName="incidentDate">
        @if (claimForm.controls.incidentDate.touched && claimForm.controls.incidentDate.invalid) {
          <span class="field-error">Incident date is required.</span>
        }
      </label>

      <label class="ib-field">
        <span class="ib-label">Covered loss</span>
        <input class="ib-input" type="number" min="0" step="0.01" formControlName="coveredLoss">
      </label>

      <label class="ib-field">
        <span class="ib-label">Deductible</span>
        <input class="ib-input" type="number" min="0" step="0.01" formControlName="deductible">
      </label>
    </div>

    @if (apiError()) {
      <p class="api-error" role="alert">{{ apiError() }}</p>
    }

    @if (submittedClaimId()) {
      <p class="ib-status-pill ib-status-pill--success" role="status">
        Claim {{ submittedClaimId() }} created
      </p>
    }

    <div class="actions">
      <button class="ib-button ib-button--primary" type="submit" [disabled]="!canSubmit()">
        {{ submitting() ? 'Submitting...' : 'Create intake' }}
      </button>
    </div>
  </form>
</main>
